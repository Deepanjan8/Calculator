name: Advanced Build and Sign APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo -n "$KEYSTORE_B64" | base64 --decode > app/nexura_release.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and Sign APK
      env:
        NEO_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        NEO_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        NEO_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew :app:assembleRelease --parallel --build-cache --configuration-cache

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Nexura-Calculator-Signed
        path: app/build/outputs/apk/release/*.apk
