name: Advanced Build and Sign APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'             # এখানে ২১ করে দেওয়া হয়েছে
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        # --decode-এর পর কোনো ফালতু স্পেস বা নয়েজ যাতে ফাইলে না যায়, তাই একটু ক্লিন করা হয়েছে
        echo "$KEYSTORE_B64" | base64 --decode > app/nexura_release.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and Sign APK
      env:
        NEO_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        NEO_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        NEO_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      # Java 21-এর সাথে Gradle Daemon-এর মেমোরি হ্যান্ডলিং আরও ভালো করার জন্য JVM অপশন যোগ করা হয়েছে
      run: |
        ./gradlew :app:assembleRelease \
          --parallel \
          --build-cache \
          --configuration-cache \
          -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Nexura-Calculator-Signed
        path: app/build/outputs/apk/release/*.apk
