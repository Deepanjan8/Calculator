name: CI Build

on:
  push:
    branches:
      - experiment/parser-fixes-modular
      - main
  pull_request:
    branches:
      - experiment/parser-fixes-modular
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK and Run Checks
      run: ./gradlew assembleDebug check --parallel --build-cache --configuration-cache

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
